[workspace]
resolver = "2"
members = [
    "crates/lightr-core",
    "crates/lightr-store",
    "crates/lightr-index",
    "crates/lightr-run",
    "crates/lightr-cli",
    "crates/lightr-acceptance",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "UNLICENSED"
publish = false

[workspace.dependencies]
blake3 = { version = "1", features = ["rayon", "mmap"] }
rayon = "1"
ignore = "0.4"
libc = "0.2"
memmap2 = "0.9"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tempfile = "3"
assert_cmd = "2"
lightr-core = { path = "crates/lightr-core" }
lightr-store = { path = "crates/lightr-store" }
lightr-index = { path = "crates/lightr-index" }
lightr-run = { path = "crates/lightr-run" }

[profile.release]
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"
