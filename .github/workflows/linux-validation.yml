name: linux-validation

# Real-Linux validation the macOS gate cannot do, on GitHub-hosted ubuntu-latest
# (org has CI credits). Jobs:
#   cri-linux         — CRI backend cfg(linux) netns/CNI runtime + /proc stats
#   acceptance-batch  — owner-gated acceptance (#51): real pull (NET) + push (REG)
#   ns-net-isolation  — #81: prove `lightr run --engine ns --net=none` isolates the
#                       network namespace (only `lo` visible) vs host-net default.
# Manual only (workflow_dispatch).
on:
  workflow_dispatch:

jobs:
  ns-net-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --no-self-update && rustup default 1.96.0
      - name: Build lightr (release) — also proves cfg(linux) ns.rs compiles
        run: cargo build -p lightr-cli --release -j2
      - name: Prepare alpine rootfs (has busybox `ip`)
        run: |
          set -e -x
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true
          BIN="$PWD/target/release/lightr"
          cid=$(docker create alpine:latest); docker export "$cid" -o /tmp/al.tar; docker rm "$cid"
          mkdir -p /tmp/alroot && sudo tar -xf /tmp/al.tar -C /tmp/alroot
          "$BIN" snapshot --dir /tmp/alroot --name alpine
      - name: Verify --net=none isolates the network namespace
        run: |
          set +e
          BIN="$PWD/target/release/lightr"
          # Bare alpine has no `ip`/iproute2 and we don't mount /proc, so probe from
          # the HOST with lsns (util-linux): a --net=none run must show up as an
          # EXTRA net namespace; a host-net run must not. No container tools needed.
          # Warm the CoW hydrate so container setup is fast, then poll for the MAX
          # netns count across the run window (robust to setup-timing).
          "$BIN" run --engine ns --net=none --rootfs alpine -- /bin/true >/dev/null 2>&1
          "$BIN" run --engine ns --rootfs alpine -- /bin/true >/dev/null 2>&1
          base=$(sudo lsns -t net -n 2>/dev/null | wc -l)
          poll_max(){ local m=$base c; for w in $(seq 1 8); do sleep 0.7; c=$(sudo lsns -t net -n 2>/dev/null | wc -l); [ "$c" -gt "$m" ] && m=$c; done; echo "$m"; }
          echo "=== HOST-net mode (default): no new net namespace ==="
          "$BIN" run --engine ns --rootfs alpine -- sleep 8 & p1=$!
          HOST_N=$(poll_max); wait $p1
          echo "=== ISOLATED mode (--net=none): one EXTRA net namespace ==="
          "$BIN" run --engine ns --net=none --rootfs alpine -- sleep 8 & p2=$!
          ISO_N=$(poll_max); wait $p2
          echo "base_netns=$base"
          echo "=== --net=none still runs (lo up) ==="
          "$BIN" run --engine ns --net=none --rootfs alpine -- /bin/true; echo "iso_true_exit=$?"
          echo "=== native + --net=none → honest error (exit 2) ==="
          "$BIN" run --net=none -- /bin/true; echo "native_netnone_exit=$?"
          echo "NETNS_DURING_HOSTMODE=$HOST_N  NETNS_DURING_ISOMODE=$ISO_N"
          # PASS iff the --net=none run created an EXTRA net namespace vs the host-net run.
          if [ "$ISO_N" -gt "$HOST_N" ]; then echo "NS_NET_ISO=PASS"; else echo "NS_NET_ISO=FAIL"; fi

  cri-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --no-self-update && rustup default 1.96.0
      - name: Install CNI plugins + a bridge conflist
        run: |
          set -e -x
          sudo mkdir -p /opt/cni/bin /etc/cni/net.d /run/netns
          curl -sL https://github.com/containernetworking/plugins/releases/download/v1.5.1/cni-plugins-linux-amd64-v1.5.1.tgz \
            | sudo tar -xz -C /opt/cni/bin
          ls /opt/cni/bin | head
          sudo tee /etc/cni/net.d/10-lightr-bridge.conflist >/dev/null <<'JSON'
          { "cniVersion":"1.0.0","name":"lightrnet","plugins":[
            {"type":"bridge","bridge":"lightr0","isGateway":true,"ipMasq":true,
             "ipam":{"type":"host-local","subnet":"10.88.0.0/16","routes":[{"dst":"0.0.0.0/0"}]}} ]}
          JSON
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true
      - name: Build CRI backend tests
        run: cargo test -p lightr-cri-backend --no-run -j2
      - name: Run CRI cfg(linux) tests (netns/CNI + /proc) as root
        run: |
          set +e
          export LIGHTR_CNI_CONF=/etc/cni/net.d LIGHTR_CNI_BIN=/opt/cni/bin
          CARGO="$HOME/.rustup/toolchains/1.96.0-x86_64-unknown-linux-gnu/bin/cargo"
          sudo -E env "PATH=$PATH" LIGHTR_CNI_CONF=$LIGHTR_CNI_CONF LIGHTR_CNI_BIN=$LIGHTR_CNI_BIN \
            "$CARGO" test -p lightr-cri-backend -j2 2>&1 | tail -45
          echo "CRI_LINUX_EXIT=${PIPESTATUS[0]}"

  acceptance-batch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --no-self-update && rustup default 1.96.0
      - name: Local OCI registry (for the push round-trip)
        run: |
          set -e -x
          docker run -d --restart=always -p 5000:5000 --name reg registry:2
          for i in $(seq 1 20); do curl -sf http://localhost:5000/v2/ && break; sleep 1; done
      - name: Build workspace (so acceptance finds the lightr bin)
        run: cargo build --workspace -j2
      - name: Acceptance batch (#51 — NET + REG lanes)
        run: |
          set +e
          export LIGHTR_NET_TESTS=1 LIGHTR_REG_TESTS=1 LIGHTR_PUSH_TARGET=localhost:5000/lightr-acceptance
          cargo test --workspace -j2 2>&1 | grep -iE "test result:|FAILED|A21|A22|real-pull|push round|error\[|panicked" | tail -45
          echo "ACCEPTANCE_EXIT=${PIPESTATUS[0]}"
