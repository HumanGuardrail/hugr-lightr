name: linux-validation

# Real-Linux validation the macOS gate cannot do, on GitHub-hosted ubuntu-latest
# (org has CI credits). Jobs:
#   cri-linux         — CRI backend cfg(linux) netns/CNI runtime + /proc stats
#   acceptance-batch  — owner-gated acceptance (#51): real pull (NET) + push (REG)
#   ns-net-isolation  — #81: prove `lightr run --engine ns --net=none` isolates the
#                       network namespace (only `lo` visible) vs host-net default.
#   cas-kpis          — WP-#86/#87: CI-signed CAS-dedup KPI probes (0-byte re-pull
#                       + N-image disk dedup ratio vs containerd) on ubuntu-latest.
#   resource-limits   — WP-#90: prove F-203 cgroup v2 enforcement on real Linux AS
#                       ROOT — memory.max OOM-kill, cpu.max limited run, and the new
#                       pids.max fork-cap (the parity-honesty gap this WP closed).
#   cri-kpi3          — WP-#88 (KPI 3): prove a REAL container runs end-to-end
#                       through the COMPOSED CRI server (kubelet→gRPC→LightrBackend)
#                       AS ROOT — crictl runp/create/start → container RUNNING,
#                       then clean teardown — plus a lightr cold-start datum +
#                       serve idle-RSS (containerd A/B is best-effort, non-fatal).
#   security-flags    — WP-#92/#94: prove `ns`-engine --read-only (rootfs EROFS,
#                       /dev/shm still writable) + --shm-size enforcement, REAL
#                       --cap-drop/--cap-add enforcement (CAP_CHOWN held→dropped→
#                       added-back, unknown-cap fail-closed), and that --privileged
#                       (all engines) + --cap-* (non-ns engines) honest-error (exit 2).
# Manual only (workflow_dispatch).
on:
  workflow_dispatch:

jobs:
  ns-net-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --no-self-update && rustup default 1.96.0
      - name: Build lightr (release) — also proves cfg(linux) ns.rs compiles
        run: cargo build -p lightr-cli --release -j2
      - name: Prepare alpine rootfs (has busybox `ip`)
        run: |
          set -e -x
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true
          BIN="$PWD/target/release/lightr"
          cid=$(docker create alpine:latest); docker export "$cid" -o /tmp/al.tar; docker rm "$cid"
          mkdir -p /tmp/alroot && sudo tar -xf /tmp/al.tar -C /tmp/alroot
          "$BIN" snapshot --dir /tmp/alroot --name alpine
      - name: Verify --net=none isolates the network namespace
        run: |
          set +e
          BIN="$PWD/target/release/lightr"
          # FUNCTIONAL isolation proof (lsns can't see a rootless user-ns'd netns):
          # listen on the HOST loopback, then have the container try to reach it.
          # host-net default → reaches it (shares host lo); --net=none → cannot
          # (its own empty lo, nothing listening). busybox `wget` ships in alpine.
          python3 -m http.server 18080 --bind 127.0.0.1 >/dev/null 2>&1 & srv=$!
          sleep 1
          # NOTE: the ns engine execs ABSOLUTE paths only (no $PATH search), so invoke
          # busybox directly. host-net reaches the host listener; --net=none cannot.
          echo "=== HOST-net mode (default): should REACH host 127.0.0.1:18080 ==="
          "$BIN" run --engine ns --rootfs alpine -- /bin/busybox wget -T 4 -q -O - http://127.0.0.1:18080 >/tmp/h.txt 2>&1; HOST_REACH=$?
          echo "host_reach_exit=$HOST_REACH"; head -3 /tmp/h.txt
          echo "=== ISOLATED (--net=none): should FAIL to reach it (isolated lo) ==="
          "$BIN" run --engine ns --net=none --rootfs alpine -- /bin/busybox wget -T 4 -q -O - http://127.0.0.1:18080 >/tmp/i.txt 2>&1; ISO_REACH=$?
          echo "iso_reach_exit=$ISO_REACH"; head -3 /tmp/i.txt
          kill $srv 2>/dev/null
          echo "=== --net=none still runs (lo up) ==="
          "$BIN" run --engine ns --net=none --rootfs alpine -- /bin/true; echo "iso_true_exit=$?"
          echo "=== native + --net=none → honest error (exit 2) ==="
          "$BIN" run --net=none -- /bin/true; echo "native_netnone_exit=$?"
          # PASS iff host-net REACHED the listener (exit 0) and --net=none did NOT.
          if [ "$HOST_REACH" = 0 ] && [ "$ISO_REACH" != 0 ]; then echo "NS_NET_ISO=PASS"; else echo "NS_NET_ISO=FAIL"; exit 1; fi  # gate for real
      - name: Verify the container has a populated /dev (#91)
        run: |
          set +e
          BIN="$PWD/target/release/lightr"
          # Before #91 the container's /dev was EMPTY → busybox job-control (`&`)
          # failed "can't open '/dev/null'". Prove the standard nodes now work:
          # write /dev/null, read /dev/zero, and run a backgrounded job (needs
          # /dev/null) — all must succeed with NO "can't open" / "can't fork".
          PROBE='echo x > /dev/null && head -c 8 /dev/zero | wc -c && sleep 1 & wait; echo DEV_OK'
          "$BIN" run --engine ns --rootfs alpine -- /bin/busybox sh -c "$PROBE" >/tmp/dev.txt 2>&1
          DEV_EXIT=$?; echo "dev_exit=$DEV_EXIT"; cat /tmp/dev.txt
          if grep -qiE "can't open|can't fork|No such file" /tmp/dev.txt; then
            echo "NS_DEV=FAIL (device-less /dev)"; exit 1
          fi
          if [ "$DEV_EXIT" = 0 ] && grep -q "DEV_OK" /tmp/dev.txt; then echo "NS_DEV=PASS"; else echo "NS_DEV=FAIL"; exit 1; fi  # gate for real
      - name: Verify snapshot preserves unreadable dirs (#93)
        run: |
          set +e
          BIN="$PWD/target/release/lightr"
          # The alpine rootfs was extracted with `sudo tar` (root-owned /root, mode
          # 700) and snapshotted as the NON-root runner — so read_dir(/root) is
          # denied at scan time. Before #93 the empty-check's unwrap_or(false)
          # treated that as non-empty and DROPPED /root (fail-open) → it vanished
          # from the rootfs. After #93 the dir is recorded, so it survives hydrate.
          "$BIN" run --engine ns --rootfs alpine -- /bin/busybox test -d /root
          ROOTDIR_EXIT=$?; echo "rootdir_exit=$ROOTDIR_EXIT"
          if [ "$ROOTDIR_EXIT" = 0 ]; then echo "NS_FIDELITY=PASS (/root survived snapshot)"; else echo "NS_FIDELITY=FAIL (/root dropped by snapshot)"; exit 1; fi  # gate for real
      - name: PID namespace entered + /proc mounted (#95/#96)
        run: |
          set +e
          BIN="$PWD/target/release/lightr"
          # Pre-#95 the ns engine unshared CLONE_NEWPID but NEVER forked a child into
          # the new pid namespace, so the workload ran in the HOST pid namespace
          # (false isolation). #95 forks PID 1 into the new ns. Checks 1–4 probe with
          # the shell's `$$` (getpid(2)), which reflects the kernel pid namespace
          # directly — proving pid-ns ENTRY independently of /proc. #96 then makes PID
          # 1 mount a FRESH procfs at <rootfs>/proc BEFORE pivot_root (while the host
          # /proc is still fully-visible), fixing the rootless-EPERM that made the old
          # mount_proc no-op; checks 5–6 re-enable the /proc-based assertions #95 had
          # to drop. The ns engine execs ABSOLUTE paths ⇒ /bin/busybox.

          # ── 1) no --init: the workload IS PID 1 in the new pid ns ──
          "$BIN" run --engine ns --rootfs alpine -- /bin/busybox sh -c 'echo pid=$$' >/tmp/pid1.txt 2>&1
          echo "--- workload \$\$ (no --init) ---"; cat /tmp/pid1.txt
          P1=$(awk -F= '/^pid=/{print $2; exit}' /tmp/pid1.txt)
          if [ "$P1" != "1" ]; then
            echo "NS_PID1=FAIL (workload pid='$P1', expected 1 — pid ns not entered)"; exit 1
          fi
          echo "NS_PID1=PASS"

          # ── 2) --init: a minimal reaper is PID 1, so the workload is PID 2 ──
          "$BIN" run --engine ns --init --rootfs alpine -- /bin/busybox sh -c 'echo pid=$$' >/tmp/pid2.txt 2>&1
          echo "--- workload \$\$ (--init) ---"; cat /tmp/pid2.txt
          P2=$(awk -F= '/^pid=/{print $2; exit}' /tmp/pid2.txt)
          if [ "$P2" != "2" ]; then
            echo "NS_INIT_PID2=FAIL (workload pid='$P2', expected 2 — init reaper is not PID 1)"; exit 1
          fi
          echo "NS_INIT_PID2=PASS"

          # ── 3) --init reaps + PROPAGATES the workload's exit code ──
          # The PID-1 reaper must exit with the workload's code (7), and that must
          # bubble all the way out of `lightr run`.
          "$BIN" run --engine ns --init --rootfs alpine -- /bin/busybox sh -c 'exit 7'
          IC=$?; echo "init_propagate_exit=$IC"
          if [ "$IC" != "7" ]; then echo "NS_INIT_EXIT=FAIL (got $IC, expected 7)"; exit 1; fi
          echo "NS_INIT_EXIT=PASS"

          # ── 4) no regression: a plain ns run still exits 0 ──
          "$BIN" run --engine ns --rootfs alpine -- /bin/true
          TC=$?; echo "plain_true_exit=$TC"
          if [ "$TC" != "0" ]; then echo "NS_TRUE=FAIL (got $TC, expected 0)"; exit 1; fi
          echo "NS_TRUE=PASS"

          # ── 5) #96: /proc is mounted AND reflects the new pid ns ──
          # The fresh procfs PID 1 mounts (before pivot_root). NOTE: don't read
          # /proc/self in a PIPELINE — `cat /proc/.. | grep` makes `cat` a CHILD of
          # the PID-1 shell, so /proc/self is the child's (pid 2), which is correct
          # but not 1. Instead prove /proc reflects the ISOLATED ns by the per-process
          # dir COUNT: a host /proc has hundreds of numeric dirs; the new ns has only
          # a couple. Pre-#96 the rootless /proc mount EPERM'd + no-op'd → /proc absent
          # → ls finds 0 numeric dirs → also fails this (count -ge 1 required).
          "$BIN" run --engine ns --rootfs alpine -- /bin/busybox sh -c 'ls -1 /proc | grep -c "^[0-9][0-9]*$"' >/tmp/proccount.txt 2>&1
          echo "--- numeric /proc dirs (no --init) ---"; cat /tmp/proccount.txt
          PC=$(tail -1 /tmp/proccount.txt | tr -dc '0-9')
          if [ -z "$PC" ] || [ "$PC" -lt 1 ] || [ "$PC" -gt 10 ]; then
            echo "NS_PROC_NS=FAIL (numeric /proc dirs='$PC'; expected 1..10 — /proc absent or showing HOST pids)"; exit 1
          fi
          echo "NS_PROC_NS=PASS (/proc shows $PC pid dir(s) — isolated ns, not the host)"

          # ── 6) #96: PID 1's own /proc entry is present + readable ──
          "$BIN" run --engine ns --rootfs alpine -- /bin/busybox sh -c 'test -r /proc/1/status && echo PROC_OK' >/tmp/procls.txt 2>&1
          PO=$?; echo "--- /proc/1/status readable ---"; cat /tmp/procls.txt
          if [ "$PO" != "0" ] || ! grep -q "PROC_OK" /tmp/procls.txt; then
            echo "NS_PROC_POP=FAIL (/proc/1 not present/readable; exit=$PO)"; exit 1
          fi
          echo "NS_PROC_POP=PASS"
          echo "NS_PIDNS=PASS"

  cri-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --no-self-update && rustup default 1.96.0
      - name: Install CNI plugins + a bridge conflist
        run: |
          set -e -x
          sudo mkdir -p /opt/cni/bin /etc/cni/net.d /run/netns
          curl -sL https://github.com/containernetworking/plugins/releases/download/v1.5.1/cni-plugins-linux-amd64-v1.5.1.tgz \
            | sudo tar -xz -C /opt/cni/bin
          ls /opt/cni/bin | head
          sudo tee /etc/cni/net.d/10-lightr-bridge.conflist >/dev/null <<'JSON'
          { "cniVersion":"1.0.0","name":"lightrnet","plugins":[
            {"type":"bridge","bridge":"lightr0","isGateway":true,"ipMasq":true,
             "ipam":{"type":"host-local","subnet":"10.88.0.0/16","routes":[{"dst":"0.0.0.0/0"}]}} ]}
          JSON
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true
      - name: Build CRI backend tests
        run: cargo test -p lightr-cri-backend --no-run -j2
      - name: Run CRI cfg(linux) tests (netns/CNI + /proc) as root
        run: |
          set +e
          export LIGHTR_CNI_CONF=/etc/cni/net.d LIGHTR_CNI_BIN=/opt/cni/bin
          CARGO="$HOME/.rustup/toolchains/1.96.0-x86_64-unknown-linux-gnu/bin/cargo"
          sudo -E env "PATH=$PATH" LIGHTR_CNI_CONF=$LIGHTR_CNI_CONF LIGHTR_CNI_BIN=$LIGHTR_CNI_BIN \
            "$CARGO" test -p lightr-cri-backend -j2 2>&1 | tail -45
          code=${PIPESTATUS[0]}; echo "CRI_LINUX_EXIT=$code"; exit "$code"  # gate for real

  cri-netns-lifecycle:
    # WP-#83: prove the CRI backend's FULL netns + CNI lifecycle (pin, real
    # connectivity, container-join, leak-free teardown) — not just "ADD gave an
    # IP". Runs only this one root+CNI-gated test binary so the host-veth leak
    # baseline is not perturbed by other netns'd tests.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --no-self-update && rustup default 1.96.0
      - name: Install CNI plugins + a bridge conflist (same as cri-linux)
        run: |
          set -e -x
          sudo mkdir -p /opt/cni/bin /etc/cni/net.d /run/netns
          curl -sL https://github.com/containernetworking/plugins/releases/download/v1.5.1/cni-plugins-linux-amd64-v1.5.1.tgz \
            | sudo tar -xz -C /opt/cni/bin
          ls /opt/cni/bin | head
          sudo tee /etc/cni/net.d/10-lightr-bridge.conflist >/dev/null <<'JSON'
          { "cniVersion":"1.0.0","name":"lightrnet","plugins":[
            {"type":"bridge","bridge":"lightr0","isGateway":true,"ipMasq":true,
             "ipam":{"type":"host-local","subnet":"10.88.0.0/16","routes":[{"dst":"0.0.0.0/0"}]}} ]}
          JSON
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true
      - name: Build the netns-lifecycle test binary
        run: cargo test -p lightr-cri-backend --test netns_lifecycle --no-run -j2
      - name: Run the netns + CNI full-lifecycle test as root
        run: |
          set +e
          export LIGHTR_CNI_CONF=/etc/cni/net.d LIGHTR_CNI_BIN=/opt/cni/bin
          CARGO="$HOME/.rustup/toolchains/1.96.0-x86_64-unknown-linux-gnu/bin/cargo"
          sudo -E env "PATH=$PATH" LIGHTR_NETNS_IT=1 LIGHTR_CNI_CONF=$LIGHTR_CNI_CONF LIGHTR_CNI_BIN=$LIGHTR_CNI_BIN \
            "$CARGO" test -p lightr-cri-backend --test netns_lifecycle -- --nocapture 2>&1 | tail -60
          code=${PIPESTATUS[0]}; echo "NETNS_LIFECYCLE_EXIT=$code"; exit "$code"  # gate for real

  acceptance-batch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --no-self-update && rustup default 1.96.0
      - name: Local OCI registry (for the push round-trip)
        run: |
          set -e -x
          docker run -d --restart=always -p 5000:5000 --name reg registry:2
          for i in $(seq 1 20); do curl -sf http://localhost:5000/v2/ && break; sleep 1; done
      - name: Build workspace (so acceptance finds the lightr bin)
        run: cargo build --workspace -j2
      - name: Acceptance batch (#51 — NET + REG lanes)
        run: |
          set +e
          export LIGHTR_NET_TESTS=1 LIGHTR_REG_TESTS=1 LIGHTR_PUSH_TARGET=localhost:5000/lightr-acceptance
          cargo test --workspace -j2 2>&1 | grep -iE "test result:|FAILED|A21|A22|real-pull|push round|error\[|panicked" | tail -45
          code=${PIPESTATUS[0]}; echo "ACCEPTANCE_EXIT=$code"; exit "$code"  # gate for real

  cas-kpis:
    # WP-#86/#87: prove lightr's content-addressed dedup moat with numbers a CI
    # run actually measures. KPI 1 = 0 new CAS bytes on re-pull; KPI 2 = N-image
    # disk dedup ratio + an honest containerd A/B. Each probe HARD-fails the job
    # on a failed bar (the script's non-zero exit propagates verbatim). NOTE: the
    # runbook's aspirational [self-hosted,linux] is overridden to ubuntu-latest —
    # we have no Linux self-hosted runner.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --no-self-update && rustup default 1.96.0
      - name: Ensure docker up + containerd/ctr present + bc
        run: |
          set -e -x
          sudo apt-get update
          sudo apt-get install -y bc
          # containerd + ctr are PRE-INSTALLED on ubuntu-latest (docker's
          # containerd.io). Do NOT apt-install the distro 'containerd' package —
          # it conflicts with containerd.io and STOPS the docker daemon (the
          # exact failure on the first run). KPI2 spawns its OWN isolated
          # containerd instance from the pre-installed binary.
          sudo systemctl restart docker || sudo service docker restart || sudo systemctl start docker
          for i in $(seq 1 30); do docker info >/dev/null 2>&1 && break; sleep 1; done
          docker version
          command -v containerd && containerd --version
          command -v ctr && ctr --version
          du -sb . >/dev/null  # confirm GNU du -sb is available
      - name: Build lightr (release)
        run: cargo build --release -p lightr-cli -j2
      - name: Put release lightr on PATH
        run: echo "$PWD/target/release" >> "$GITHUB_PATH"
      - name: KPI 1 — pull dedup (0 new CAS bytes on re-pull)
        run: |
          set +e
          KPI_BACKEND_READY=1 LIGHTR_BIN="$PWD/target/release/lightr" \
            ./ci/linux-kpis/kpi1-pull-dedup.sh
          code=$?; echo "CAS_KPI1_EXIT=$code"; exit "$code"  # gate for real
      - name: KPI 2 — disk dedup ratio + containerd A/B
        run: |
          set +e
          KPI_BACKEND_READY=1 LIGHTR_BIN="$PWD/target/release/lightr" \
            ./ci/linux-kpis/kpi2-disk-dedup.sh
          code=$?; echo "CAS_KPI2_EXIT=$code"; exit "$code"  # gate for real

  resource-limits:
    # WP-#90: prove F-203 resource caps are ACTUALLY enforced by cgroup v2 on the
    # `ns` engine — not just persisted. Runs the release lightr AS ROOT (sudo): the
    # cgroup-v2 root /sys/fs/cgroup is writable by root, so `apply_cgroup` creates a
    # transient leaf and writes memory.max/cpu.max/pids.max. (Rootless needs a
    # delegated subtree — `systemd-run --user -p Delegate=yes` — which GitHub's
    # ubuntu-latest does not pre-provision; root is the honest CI path here.) The ns
    # engine execs ABSOLUTE paths only, so every probe invokes /bin/busybox directly.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --no-self-update && rustup default 1.96.0
      - name: Build lightr (release)
        run: cargo build -p lightr-cli --release -j2
      - name: Prepare alpine rootfs (busybox awk/sh)
        run: |
          set -e -x
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true
          BIN="$PWD/target/release/lightr"
          cid=$(docker create alpine:latest); docker export "$cid" -o /tmp/al.tar; docker rm "$cid"
          mkdir -p /tmp/alroot && sudo tar -xf /tmp/al.tar -C /tmp/alroot
          # NOTE: the materialized rootfs has a device-less /dev (lightr's snapshot
          # carries file content, not device nodes), so the pids probe uses a
          # PIPELINE (no /dev/null / job-control needed) rather than `&`.
          "$BIN" snapshot --dir /tmp/alroot --name alpine
      - name: Prove memory.max OOM-kill + cpu.max + pids.max fork-cap (as root)
        run: |
          set +e
          BIN="$PWD/target/release/lightr"
          # Snapshot store lives under the invoking user's HOME; pass it to root so
          # `sudo lightr` resolves the same `alpine` ref (LIGHTR_HOME is honored).
          export LIGHTR_HOME="$HOME/.lightr"
          RUN() { sudo -E env "LIGHTR_HOME=$LIGHTR_HOME" "$BIN" "$@"; }

          # ── MEMORY: busybox awk doubles a string forever → must be OOM-killed
          # under memory.max=64m. A faithful cap kills it ⇒ NON-zero exit (137 on
          # SIGKILL). If it ran to "completion" (exit 0) the cap did NOT bite. ──────
          echo "=== MEMORY: --memory 64m awk string-bomb → expect OOM kill (non-zero) ==="
          RUN run --engine ns --memory 64m --rootfs alpine -- \
            /bin/busybox awk 'BEGIN{s="x";while(1)s=s s}' >/tmp/mem.txt 2>&1
          MEM_EXIT=$?; echo "RESLIMITS_MEM_EXIT=$MEM_EXIT"; tail -3 /tmp/mem.txt

          # ── CPU: a short cpu-bound busybox loop under --cpus 0.5 must still RUN to
          # completion (the share throttles, it does not kill). Proves the cpu.max
          # apply path does not error the run. (cpu.max VALUE assertion is covered by
          # the unit/apply path — the transient cgroup is process-scoped + torn down,
          # so a post-hoc host read is unreliable; this proves the limited run works.)
          echo "=== CPU: --cpus 0.5 short loop → expect completion (exit 0) ==="
          RUN run --engine ns --cpus 0.5 --rootfs alpine -- \
            /bin/busybox sh -c 'i=0; while [ $i -lt 200000 ]; do i=$((i+1)); done; echo cpu_ok' \
            >/tmp/cpu.txt 2>&1
          CPU_EXIT=$?; echo "RESLIMITS_CPU_EXIT=$CPU_EXIT"; tail -2 /tmp/cpu.txt

          # ── PIDS: a PIPELINE forks one process per stage at construction time,
          # WITHOUT needing /dev/null or shell job-control — the CAS-materialized
          # rootfs has a device-less /dev (snapshot doesn't carry device nodes), so
          # `cmd &` backgrounding fails on a missing /dev/null and masks the signal.
          # A 12-stage pipeline of `sleep 2` forks 12 procs into the cgroup; with
          # pids.max=4 the forks past the cap fail with EAGAIN → busybox "can't fork".
          # Control (no --pids-limit → no cgroup) runs the SAME 12 with ZERO failures,
          # so the cap is provably what bit. ─────────────────────────────────────────
          PIPE='sleep 2 | sleep 2 | sleep 2 | sleep 2 | sleep 2 | sleep 2 | sleep 2 | sleep 2 | sleep 2 | sleep 2 | sleep 2 | sleep 2; echo pipedone'
          echo "=== PIDS capped: --pids-limit 4 → expect 'can't fork' (pids.max EAGAIN) ==="
          RUN run --engine ns --pids-limit 4 --rootfs alpine -- /bin/busybox sh -c "$PIPE" >/tmp/pcap.txt 2>&1
          CAP_FORKFAIL=$(grep -c "can't fork" /tmp/pcap.txt); echo "cap fork-failures=$CAP_FORKFAIL"; tail -3 /tmp/pcap.txt
          echo "=== PIDS control: NO --pids-limit → expect 0 'can't fork' ==="
          RUN run --engine ns --rootfs alpine -- /bin/busybox sh -c "$PIPE" >/tmp/pfree.txt 2>&1
          FREE_FORKFAIL=$(grep -c "can't fork" /tmp/pfree.txt); echo "free fork-failures=$FREE_FORKFAIL"; tail -3 /tmp/pfree.txt
          echo "RESLIMITS_PIDS_CAP_FORKFAIL=$CAP_FORKFAIL RESLIMITS_PIDS_FREE_FORKFAIL=$FREE_FORKFAIL"

          # ── vz honest-error: --pids-limit --engine vz must exit 2 (no silent drop).
          # (vz is unavailable on Linux, so this also exercises the CLI guard that
          # fires BEFORE any engine selection.) ────────────────────────────────────
          echo "=== vz + --pids-limit → honest exit 2 ==="
          RUN run --engine vz --pids-limit 16 --rootfs alpine -- /bin/true >/tmp/vz.txt 2>&1
          VZ_EXIT=$?; echo "RESLIMITS_VZ_PIDS_EXIT=$VZ_EXIT"; tail -2 /tmp/vz.txt

          # ── GATE (no false-green: every proof must hold or the job fails) ─────────
          FAIL=0
          [ "$MEM_EXIT" != 0 ] || { echo "FAIL: 64m awk bomb was NOT OOM-killed (exit $MEM_EXIT)"; FAIL=1; }
          [ "$CPU_EXIT" = 0 ]  || { echo "FAIL: --cpus 0.5 limited run did not complete (exit $CPU_EXIT)"; FAIL=1; }
          # pids.max must bite: the capped run shows fork failures, the control none.
          if ! { [ "$CAP_FORKFAIL" -ge 1 ] && [ "$FREE_FORKFAIL" -eq 0 ]; }; then
            echo "FAIL: pids.max did not cap forks (cap_forkfail=$CAP_FORKFAIL free_forkfail=$FREE_FORKFAIL)"; FAIL=1
          fi
          [ "$VZ_EXIT" = 2 ]   || { echo "FAIL: vz+--pids-limit did not honest-error with exit 2 (exit $VZ_EXIT)"; FAIL=1; }
          if [ "$FAIL" = 0 ]; then echo "RESLIMITS=PASS"; else echo "RESLIMITS=FAIL"; exit 1; fi  # gate for real

  security-flags:
    # WP-#92/#94: prove the security/runtime flags on the `ns` engine are ACTUALLY
    # enforced (read-only rootfs, sized /dev/shm, REAL --cap-drop/--cap-add) — not
    # silently recorded — and that the unenforceable cases honest-error (exit 2)
    # before running rather than give false security: --privileged on every engine,
    # and --cap-* on NON-ns engines (native = no sandbox; vz caps live in the guest).
    # Rootless ns (no sudo): the read-only remount, /dev/shm tmpfs, and capability
    # drops (bounding set + capset) all work in the new user namespace. The ns engine
    # execs ABSOLUTE paths only, so every probe invokes /bin/busybox.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --no-self-update && rustup default 1.96.0
      - name: Build lightr (release) — also proves cfg(linux) ns.rs compiles
        run: cargo build -p lightr-cli --release -j2
      - name: Prepare alpine rootfs
        run: |
          set -e -x
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true
          BIN="$PWD/target/release/lightr"
          cid=$(docker create alpine:latest); docker export "$cid" -o /tmp/al.tar; docker rm "$cid"
          mkdir -p /tmp/alroot && sudo tar -xf /tmp/al.tar -C /tmp/alroot
          "$BIN" snapshot --dir /tmp/alroot --name alpine
      - name: Prove --read-only / --shm-size enforcement + honest-errors
        run: |
          set +e
          BIN="$PWD/target/release/lightr"

          # ── READ-ONLY: a write to the rootfs must FAIL (EROFS) under --read-only,
          # and SUCCEED without it (control) — proving the remount actually bit. ────
          # Write at the rootfs ROOT (/lightr_ro_probe) — `/root`,`/tmp` are EMPTY
          # dirs in alpine and lightr's snapshot drops empty dirs (rootfs-fidelity
          # gap, tracked separately), so they're "nonexistent" in the container; the
          # mount root `/` always exists and is what --read-only must protect.
          echo "=== read-only: write /lightr_ro_probe under --read-only → expect FAIL (EROFS) ==="
          "$BIN" run --engine ns --read-only --rootfs alpine -- \
            /bin/busybox sh -c 'echo x > /lightr_ro_probe && echo WROTE_RO' >/tmp/ro.txt 2>&1
          RO_EXIT=$?; echo "ro_exit=$RO_EXIT"; tail -3 /tmp/ro.txt
          echo "=== control: write /lightr_ro_probe WITHOUT --read-only → expect OK ==="
          "$BIN" run --engine ns --rootfs alpine -- \
            /bin/busybox sh -c 'echo x > /lightr_ro_probe && echo WROTE_RW' >/tmp/rw.txt 2>&1
          RW_EXIT=$?; echo "rw_exit=$RW_EXIT"; tail -3 /tmp/rw.txt

          # ── /dev/shm WRITABLE under --read-only (the key correctness point: a RO
          # root must still have writable shared memory). ──────────────────────────
          echo "=== read-only: write /dev/shm/x under --read-only → expect OK ==="
          "$BIN" run --engine ns --read-only --rootfs alpine -- \
            /bin/busybox sh -c 'echo x > /dev/shm/x && echo SHM_WRITABLE' >/tmp/shmw.txt 2>&1
          SHMW_EXIT=$?; echo "shmw_exit=$SHMW_EXIT"; tail -3 /tmp/shmw.txt

          # ── SHM-SIZE: a 16m /dev/shm must REJECT a 20m write and ACCEPT an 8m one
          # (busybox dd to a file on the tmpfs; over-size write fails "No space"). ──
          echo "=== shm-size 16m: write 20m to /dev/shm → expect FAIL (No space) ==="
          "$BIN" run --engine ns --shm-size 16m --rootfs alpine -- \
            /bin/busybox sh -c 'dd if=/dev/zero of=/dev/shm/big bs=1M count=20 && echo SHM_20M_OK' >/tmp/s20.txt 2>&1
          S20_EXIT=$?; echo "s20_exit=$S20_EXIT"; tail -3 /tmp/s20.txt
          echo "=== shm-size 16m: write 8m to /dev/shm → expect OK ==="
          "$BIN" run --engine ns --shm-size 16m --rootfs alpine -- \
            /bin/busybox sh -c 'dd if=/dev/zero of=/dev/shm/small bs=1M count=8 && echo SHM_8M_OK' >/tmp/s8.txt 2>&1
          S8_EXIT=$?; echo "s8_exit=$S8_EXIT"; tail -3 /tmp/s8.txt

          # ── HONEST-ERRORS: --privileged / --cap-drop must exit 2 BEFORE running. ──
          echo "=== --privileged → honest exit 2 ==="
          "$BIN" run --engine ns --privileged --rootfs alpine -- /bin/true >/tmp/priv.txt 2>&1
          PRIV_EXIT=$?; echo "priv_exit=$PRIV_EXIT"; tail -2 /tmp/priv.txt
          # WP-#94: the `ns` engine now ENFORCES --cap-drop/--cap-add (proved in the
          # next step). The HONEST-ERROR is for NON-ns engines: native is no sandbox,
          # so --cap-drop on --engine native must still exit 2 BEFORE running.
          echo "=== --engine native --cap-drop ALL → honest exit 2 ==="
          "$BIN" run --engine native --cap-drop ALL -- /bin/true >/tmp/cap.txt 2>&1
          CAP_EXIT=$?; echo "cap_exit=$CAP_EXIT"; tail -2 /tmp/cap.txt

          # ── GATE (no false-green: every proof must hold or the job fails) ─────────
          FAIL=0
          [ "$RO_EXIT" != 0 ]   || { echo "FAIL: --read-only did NOT block the rootfs write (exit $RO_EXIT)"; FAIL=1; }
          grep -qiE "read-only|EROFS" /tmp/ro.txt || { echo "FAIL: --read-only write did not report a read-only fs"; FAIL=1; }
          [ "$RW_EXIT" = 0 ]    || { echo "FAIL: control write WITHOUT --read-only failed (exit $RW_EXIT)"; FAIL=1; }
          [ "$SHMW_EXIT" = 0 ]  || { echo "FAIL: /dev/shm NOT writable under --read-only (exit $SHMW_EXIT)"; FAIL=1; }
          grep -q SHM_WRITABLE /tmp/shmw.txt || { echo "FAIL: /dev/shm write under --read-only produced no proof"; FAIL=1; }
          [ "$S20_EXIT" != 0 ]  || { echo "FAIL: 20m write to a 16m /dev/shm succeeded (size not enforced)"; FAIL=1; }
          [ "$S8_EXIT" = 0 ]    || { echo "FAIL: 8m write to a 16m /dev/shm failed (exit $S8_EXIT)"; FAIL=1; }
          [ "$PRIV_EXIT" = 2 ]  || { echo "FAIL: --privileged did not honest-error with exit 2 (exit $PRIV_EXIT)"; FAIL=1; }
          [ "$CAP_EXIT" = 2 ]   || { echo "FAIL: native --cap-drop did not honest-error with exit 2 (exit $CAP_EXIT)"; FAIL=1; }
          if [ "$FAIL" = 0 ]; then echo "SECFLAGS=PASS"; else echo "SECFLAGS=FAIL"; exit 1; fi  # gate for real

      - name: Prove --cap-drop/--cap-add capability enforcement (ns engine)
        run: |
          # WP-#94: prove the `ns` engine ACTUALLY drops/adds Linux capabilities
          # (not a silent no-op). CAP_DAC_OVERRIDE is the robust rootless test cap:
          # owner-reading a self-owned mode-000 file needs it, and it involves NO
          # uid mapping / host-superblock ownership (unlike CAP_CHOWN, where chown
          # to an unmapped uid / a host-owned sb can fail even with caps held). The
          # probe file is at the rootfs ROOT (/capf) — always present. The ns engine
          # execs ABSOLUTE paths only ⇒ every probe invokes /bin/busybox.
          set +e
          BIN="$PWD/target/release/lightr"
          # write content, chmod 000 (owner ops need no cap), then read it back —
          # reading a self-owned 000 file requires CAP_DAC_OVERRIDE.
          PROBE='echo data > /capf && chmod 000 /capf && cat /capf'

          echo "=== control: caps held → read 000 file succeeds (expect exit 0) ==="
          "$BIN" run --engine ns --rootfs alpine -- /bin/busybox sh -c "$PROBE" >/tmp/cc.txt 2>&1
          CC_EXIT=$?; echo "cc_exit=$CC_EXIT"; tail -3 /tmp/cc.txt

          echo "=== dropped: --cap-drop ALL → read must FAIL (EACCES, non-zero) ==="
          "$BIN" run --engine ns --cap-drop ALL --rootfs alpine -- /bin/busybox sh -c "$PROBE" >/tmp/cd.txt 2>&1
          CD_EXIT=$?; echo "cd_exit=$CD_EXIT"; tail -3 /tmp/cd.txt

          echo "=== add-back: --cap-drop ALL --cap-add DAC_OVERRIDE → read succeeds (exit 0) ==="
          "$BIN" run --engine ns --cap-drop ALL --cap-add DAC_OVERRIDE --rootfs alpine -- /bin/busybox sh -c "$PROBE" >/tmp/ca.txt 2>&1
          CA_EXIT=$?; echo "ca_exit=$CA_EXIT"; tail -3 /tmp/ca.txt

          echo "=== unknown cap name: --cap-drop BOGUS_CAP → fail-closed (non-zero) ==="
          "$BIN" run --engine ns --cap-drop BOGUS_CAP --rootfs alpine -- /bin/true >/tmp/cu.txt 2>&1
          CU_EXIT=$?; echo "cu_exit=$CU_EXIT"; tail -3 /tmp/cu.txt

          # ── GATE (assert via exit codes; no false-green) ─────────────────────────
          FAIL=0
          [ "$CC_EXIT" = 0 ]  || { echo "FAIL: control read of 000 file (caps held) failed (exit $CC_EXIT) — cap baseline wrong"; FAIL=1; }
          [ "$CD_EXIT" != 0 ] || { echo "FAIL: --cap-drop ALL did NOT block the read (CAP_DAC_OVERRIDE not enforced — FALSE SECURITY)"; FAIL=1; }
          [ "$CA_EXIT" = 0 ]  || { echo "FAIL: --cap-add DAC_OVERRIDE did not restore the read (exit $CA_EXIT)"; FAIL=1; }
          [ "$CU_EXIT" != 0 ] || { echo "FAIL: unknown cap name silently accepted (not fail-closed on a typo'd flag)"; FAIL=1; }
          if [ "$FAIL" = 0 ]; then echo "CAPENFORCE=PASS"; else echo "CAPENFORCE=FAIL"; exit 1; fi  # gate for real

  cri-serve-smoke:
    # WP-#98: prove the COMPOSED CRI server (the REAL LightrBackend wired into the
    # sibling lightr-cri shell via crates/lightr-cri-serve) BUILDS and ANSWERS
    # crictl in CI — the integration landing proof. Needs the PRIVATE sibling repo,
    # so: the LIGHTR_CRI_CI_TOKEN fine-grained RO PAT (configured via url.insteadOf)
    # + CARGO_NET_GIT_FETCH_WITH_CLI. lightr-cri-serve is excluded from the default
    # workspace ⇒ built explicitly via --manifest-path (the gate never pulls tonic).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --no-self-update && rustup default 1.96.0
      - name: Auth git for the private sibling (cargo git-dep)
        run: |
          git config --global url."https://x-access-token:${{ secrets.LIGHTR_CRI_CI_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Build lightr-cri-serve (real backend + sibling shell, git-deps)
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: cargo build --release --manifest-path crates/lightr-cri-serve/Cargo.toml -j2
      - name: Install crictl
        run: |
          set -e -x
          V=v1.31.1
          curl -sL "https://github.com/kubernetes-sigs/cri-tools/releases/download/$V/crictl-$V-linux-amd64.tar.gz" | sudo tar -xz -C /usr/local/bin
          crictl --version
      - name: Start lightr cri serve + prove it answers crictl
        run: |
          set +e
          BIN="crates/lightr-cri-serve/target/release/lightr-cri-serve"
          SOCK=/tmp/lcri.sock
          "$BIN" --socket "$SOCK" --state /tmp/lcri-state >/tmp/serve.log 2>&1 &
          SVPID=$!
          for i in $(seq 1 40); do [ -S "$SOCK" ] && break; sleep 0.5; done
          if [ ! -S "$SOCK" ]; then echo "CRI_SERVE_SMOKE=FAIL (socket never appeared)"; cat /tmp/serve.log; kill $SVPID 2>/dev/null; exit 1; fi
          crictl --runtime-endpoint "unix://$SOCK" --image-endpoint "unix://$SOCK" version >/tmp/ver.txt 2>&1
          VER_EXIT=$?; echo "crictl_version_exit=$VER_EXIT"; cat /tmp/ver.txt
          kill $SVPID 2>/dev/null
          # PASS iff crictl's Version RPC succeeded → the composed CRI server (real
          # LightrBackend behind the gRPC shell) answered. No false-green.
          if [ "$VER_EXIT" = 0 ] && grep -qiE "RuntimeName|RuntimeApiVersion|Version:" /tmp/ver.txt; then
            echo "CRI_SERVE_SMOKE=PASS"
          else
            echo "CRI_SERVE_SMOKE=FAIL"; cat /tmp/serve.log; exit 1
          fi

  cri-kpi3:
    # WP-#88 (KPI 3): prove a REAL container runs END-TO-END through the COMPOSED
    # CRI server (the real LightrBackend wired into the sibling lightr-cri shell
    # via crates/lightr-cri-serve) — kubelet→gRPC→LightrBackend→host-process. The
    # server runs AS ROOT so the pod sandbox (host_network:false) does netns + CNI
    # ADD (the path validated in #83) and the container joins the pod netns at
    # spawn. WP-#99: the container now runs the REAL image rootfs under the `ns`
    # engine (hydrated from the CAS, pivoted, joined into the pod netns) — proven by
    # the real-container gate (PID 1 + alpine-release in its own root) and the
    # cgroup.kill stop gate. Deliverable A (HARD GATE): crictl runp/create/start →
    # container RUNNING, real-container proof, cgroup.kill stop, clean teardown.
    # Deliverable B: a lightr cold-start datum (N
    # iterations) + serve idle-RSS, REAL+measured on this runner; the containerd
    # A/B is a clearly-marked, NON-FATAL best-effort (flaky on network AND
    # apples-to-oranges — containerd runs the alpine ROOTFS, this backend runs a
    # host process — so its ratio is NOT signed as a like-for-like KPI here).
    # Same private-sibling auth + manifest-path build as cri-serve-smoke.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --no-self-update && rustup default 1.96.0
      - name: Auth git for the private sibling (cargo git-dep)
        run: |
          git config --global url."https://x-access-token:${{ secrets.LIGHTR_CRI_CI_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Build lightr-cri-serve (real backend + sibling shell, git-deps)
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: cargo build --release --manifest-path crates/lightr-cri-serve/Cargo.toml -j2
      - name: Build lightr (release) — for the pre-seed image fallback
        run: cargo build -p lightr-cli --release -j2
      - name: Install crictl
        run: |
          set -e -x
          V=v1.31.1
          curl -sL "https://github.com/kubernetes-sigs/cri-tools/releases/download/$V/crictl-$V-linux-amd64.tar.gz" | sudo tar -xz -C /usr/local/bin
          crictl --version
      - name: Install CNI plugins + a bridge conflist (same as cri-linux)
        run: |
          set -e -x
          sudo mkdir -p /opt/cni/bin /etc/cni/net.d /run/netns
          curl -sL https://github.com/containernetworking/plugins/releases/download/v1.5.1/cni-plugins-linux-amd64-v1.5.1.tgz \
            | sudo tar -xz -C /opt/cni/bin
          ls /opt/cni/bin | head
          sudo tee /etc/cni/net.d/10-lightr-bridge.conflist >/dev/null <<'JSON'
          { "cniVersion":"1.0.0","name":"lightrnet","plugins":[
            {"type":"bridge","bridge":"lightr0","isGateway":true,"ipMasq":true,
             "ipam":{"type":"host-local","subnet":"10.88.0.0/16","routes":[{"dst":"0.0.0.0/0"}]}} ]}
          JSON
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true
      - name: KPI 3 — real container lifecycle through the composed CRI server (+ cold-start)
        run: |
          set +e
          export LIGHTR_CNI_CONF=/etc/cni/net.d LIGHTR_CNI_BIN=/opt/cni/bin
          SOCK=/tmp/lightr-kpi3.sock
          STATE=/tmp/lightr-kpi3-state
          SERVE="crates/lightr-cri-serve/target/release/lightr-cri-serve"
          LIGHTR="$PWD/target/release/lightr"
          LOGDIR=/tmp/kpi3-logs
          sudo rm -rf "$STATE" "$LOGDIR" "$SOCK"
          sudo mkdir -p "$LOGDIR" /run/netns

          # crictl helper bound to the lightr serve socket (root: socket is root-owned).
          CR() { sudo crictl --runtime-endpoint "unix://$SOCK" --image-endpoint "unix://$SOCK" "$@"; }

          # ── Start the COMPOSED CRI server AS ROOT (netns + CNI ADD need privilege),
          # with the CNI env the real backend probes. ─────────────────────────────────
          sudo -E env "PATH=$PATH" LIGHTR_CNI_CONF="$LIGHTR_CNI_CONF" LIGHTR_CNI_BIN="$LIGHTR_CNI_BIN" \
            "$SERVE" --socket "$SOCK" --state "$STATE" >/tmp/serve.log 2>&1 &
          for i in $(seq 1 40); do [ -S "$SOCK" ] && break; sleep 0.5; done
          if [ ! -S "$SOCK" ]; then echo "KPI3=FAIL (serve socket never appeared)"; sudo cat /tmp/serve.log; exit 1; fi
          CR version >/tmp/ver.txt 2>&1 || { echo "KPI3=FAIL (Version RPC failed)"; cat /tmp/ver.txt; sudo cat /tmp/serve.log; exit 1; }
          echo "=== serve answers crictl ==="; cat /tmp/ver.txt

          # ── Step 2: make the alpine image available. PRIMARY = CRI pull path (crictl
          # pull → LightrBackend.pull_image → lightr_oci::pull). FALLBACK = pre-seed
          # the SAME state store via the `lightr` bin (LIGHTR_HOME=$STATE → $STATE/store).
          # WP-#99: the container plane now HYDRATES this image's rootfs from the CAS and
          # runs the command under the `ns` engine (real alpine root + pod netns), so the
          # image content IS the container fs — the real-container gate below proves it.
          # The store name MUST match `sanitize_ref("alpine:latest")` = "alpine-latest"
          # so the hydrate lookup hits (the pre-seed name is set accordingly).
          if CR pull alpine:latest >/tmp/pull.log 2>&1; then
            echo "KPI3_IMAGE_PATH=crictl-pull"
          else
            echo "crictl pull failed — falling back to pre-seed:"; cat /tmp/pull.log
            if sudo -E env LIGHTR_HOME="$STATE" "$LIGHTR" oci pull alpine:latest --name alpine-latest >/tmp/seed.log 2>&1; then
              echo "KPI3_IMAGE_PATH=pre-seed"
            else
              echo "KPI3=FAIL (alpine image unavailable — the real-container gate needs the rootfs)"; cat /tmp/seed.log; sudo pkill -f lightr-cri-serve; exit 1
            fi
          fi
          CR images 2>/dev/null || true

          # ── Step 3: pod-sandbox + container config (crictl JSON). host_network
          # defaults to false → the backend creates+pins a netns and runs CNI ADD. The
          # container command (WP-#99) PROVES the real-container path: it prints its own
          # PID (PID 1 ⇒ its own pid namespace), the alpine release file (only present in
          # the ALPINE rootfs — NOT on the ubuntu runner), and `ls /` — all to its CRI
          # log, then sleeps so it stays Running for the gate + a clean cgroup.kill stop.
          cat >/tmp/pod.json <<'JSON'
          {
            "metadata": { "name": "kpi3-pod", "uid": "kpi3-pod-uid", "namespace": "default", "attempt": 1 },
            "log_directory": "/tmp/kpi3-logs",
            "linux": {}
          }
          JSON
          cat >/tmp/ctr.json <<'JSON'
          {
            "metadata": { "name": "kpi3-ctr", "attempt": 1 },
            "image": { "image": "alpine:latest" },
            "command": ["/bin/sh", "-c", "echo PID=$$; echo ALPINE_RELEASE=$(cat /etc/alpine-release); echo ROOTLS=$(ls / | tr '\\n' ',' ); sleep 600"],
            "log_path": "kpi3-ctr.log",
            "linux": {}
          }
          JSON

          POD_ID=$(CR runp /tmp/pod.json 2>/tmp/runp.log)
          if [ -z "$POD_ID" ]; then echo "KPI3=FAIL (runp returned no pod id)"; cat /tmp/runp.log; sudo cat /tmp/serve.log; sudo pkill -f lightr-cri-serve; exit 1; fi
          echo "POD_ID=$POD_ID"
          CTR_ID=$(CR create "$POD_ID" /tmp/ctr.json /tmp/pod.json 2>/tmp/create.log)
          if [ -z "$CTR_ID" ]; then echo "KPI3=FAIL (create returned no container id)"; cat /tmp/create.log; sudo cat /tmp/serve.log; CR rmp -f "$POD_ID"; sudo pkill -f lightr-cri-serve; exit 1; fi
          echo "CTR_ID=$CTR_ID"
          CR start "$CTR_ID" >/tmp/start.log 2>&1
          echo "start exit=$?"; cat /tmp/start.log

          # ── Step 4: GATE — the container MUST reach Running (poll up to ~30s). ──────
          RUNNING=0
          for i in $(seq 1 30); do
            STATE_NOW=$(CR inspect "$CTR_ID" 2>/dev/null | jq -r '.status.state' 2>/dev/null)
            echo "poll $i: state=$STATE_NOW"
            if [ "$STATE_NOW" = "CONTAINER_RUNNING" ]; then RUNNING=1; break; fi
            sleep 1
          done
          echo "=== crictl ps -a ==="; CR ps -a 2>&1 | head -20
          if [ "$RUNNING" != 1 ]; then
            echo "KPI3_LIFECYCLE=FAIL (container never reached Running)"
            echo "=== inspect ==="; CR inspect "$CTR_ID" 2>&1 | head -60
            echo "=== serve.log ==="; sudo cat /tmp/serve.log
            CR stop "$CTR_ID" >/dev/null 2>&1; CR rmp -f "$POD_ID" >/dev/null 2>&1; sudo pkill -f lightr-cri-serve
            exit 1
          fi
          echo "KPI3_LIFECYCLE=PASS (real container RUNNING through the composed CRI server: kubelet→gRPC→LightrBackend→ns-engine-in-pod-netns)"

          # ── WP-#99 REAL-CONTAINER GATE: prove the container is the ALPINE rootfs
          # under ns isolation (NOT a host process). The container wrote its proof to
          # its CRI log; read it and assert. ───────────────────────────────────────────
          sleep 2  # let the stdout→tee→CRI-log flush settle (the echoes are the container's first act)
          CLOG="$LOGDIR/kpi3-ctr.log"
          echo "=== container CRI log ($CLOG) ==="; sudo cat "$CLOG" 2>/dev/null || echo "(no log)"
          # The runner (ubuntu) must NOT have /etc/alpine-release — so its presence in
          # the container log can ONLY come from the alpine rootfs the container pivoted.
          if [ -f /etc/alpine-release ]; then
            echo "KPI3_REAL=SKIP-UNEXPECTED (runner unexpectedly has /etc/alpine-release — proof would be ambiguous)"; HOST_HAS_ALPINE=1
          else
            HOST_HAS_ALPINE=0
          fi
          LOGTXT="$(sudo cat "$CLOG" 2>/dev/null)"
          FAIL=0
          echo "$LOGTXT" | grep -q "PID=1"            || { echo "REAL_FAIL: container is not PID 1 (no own pid namespace)"; FAIL=1; }
          echo "$LOGTXT" | grep -qE "ALPINE_RELEASE=[0-9]" || { echo "REAL_FAIL: /etc/alpine-release absent ⇒ container root is NOT the alpine rootfs (host-process fallback?)"; FAIL=1; }
          [ "$HOST_HAS_ALPINE" = 0 ] || { echo "REAL_FAIL: runner has /etc/alpine-release — cannot attribute the proof to the container root"; FAIL=1; }
          if [ "$FAIL" != 0 ]; then
            echo "KPI3_REAL=FAIL (container is not the real alpine rootfs under ns isolation)"
            echo "=== inspect ==="; CR inspect "$CTR_ID" 2>&1 | head -60
            echo "=== serve.log ==="; sudo cat /tmp/serve.log
            CR stop "$CTR_ID" >/dev/null 2>&1; CR rmp -f "$POD_ID" >/dev/null 2>&1; sudo pkill -f lightr-cri-serve
            exit 1
          fi
          echo "KPI3_REAL=PASS (container is PID 1 in its own netns/pidns, rooted at the ALPINE rootfs — real ns container, not a host process)"

          # ── WP-#99 STOP GATE: crictl stop must cgroup.kill the whole subtree. The
          # cgroup leaf is `lightr-cri-<CTR_ID>`; after stop its cgroup.procs must be
          # empty (PID 1 + descendants gone). ──────────────────────────────────────────
          CGROUP="/sys/fs/cgroup/lightr-cri-$CTR_ID"
          echo "=== cgroup.procs BEFORE stop ($CGROUP) ==="; sudo cat "$CGROUP/cgroup.procs" 2>/dev/null || echo "(cgroup absent — ns path not taken?)"
          if [ ! -f "$CGROUP/cgroup.procs" ]; then
            echo "KPI3_STOP=FAIL (no container cgroup at $CGROUP — the ns path was not taken)"; sudo cat /tmp/serve.log; CR rmp -f "$POD_ID" >/dev/null 2>&1; sudo pkill -f lightr-cri-serve; exit 1
          fi
          CR stop "$CTR_ID" >/tmp/stop.log 2>&1; echo "stop exit=$?"; cat /tmp/stop.log
          # Poll the cgroup until empty (cgroup.kill is async-ish; give it a moment).
          PROCS_LEFT="?"
          for i in $(seq 1 20); do
            PROCS_LEFT="$(sudo cat "$CGROUP/cgroup.procs" 2>/dev/null | tr -d ' \n')"
            [ -z "$PROCS_LEFT" ] && break
            sleep 0.5
          done
          echo "=== cgroup.procs AFTER stop ==="; sudo cat "$CGROUP/cgroup.procs" 2>/dev/null | head || echo "(empty/gone)"
          if [ -n "$PROCS_LEFT" ]; then
            echo "KPI3_STOP=FAIL (cgroup still has processes after stop: [$PROCS_LEFT] — cgroup.kill did not take down the subtree)"
            sudo cat /tmp/serve.log; CR rmp -f "$POD_ID" >/dev/null 2>&1; sudo pkill -f lightr-cri-serve; exit 1
          fi
          echo "KPI3_STOP=PASS (crictl stop cgroup.kill'd the whole subtree — container cgroup empty)"

          # ── Deliverable B — lightr cold-start (REAL, reuses this serve). ───────────
          echo "=== B: lightr cold-start (create+start → Running), N iterations, same pod ==="
          N=5
          TIMES=""
          for it in $(seq 1 "$N"); do
            cat >/tmp/ctr-b.json <<JSON
          {
            "metadata": { "name": "kpi3-bench", "attempt": $it },
            "image": { "image": "alpine:latest" },
            "command": ["/bin/sh", "-c", "sleep 600"],
            "log_path": "kpi3-bench-$it.log",
            "linux": {}
          }
          JSON
            t0=$(date +%s%N)
            BID=$(CR create "$POD_ID" /tmp/ctr-b.json /tmp/pod.json 2>/dev/null)
            CR start "$BID" >/dev/null 2>&1
            bdeadline=$((SECONDS + 30))
            while :; do
              S=$(CR inspect "$BID" 2>/dev/null | jq -r '.status.state' 2>/dev/null)
              [ "$S" = "CONTAINER_RUNNING" ] && break
              [ "$SECONDS" -ge "$bdeadline" ] && break
              sleep 0.02
            done
            t1=$(date +%s%N)
            ms=$(( (t1 - t0) / 1000000 ))
            echo "iter $it: ${ms}ms (state=$S)"
            TIMES="$TIMES $ms"
            CR stop "$BID" >/dev/null 2>&1; CR rm "$BID" >/dev/null 2>&1
          done
          echo "KPI3_LIGHTR_COLDSTART_MS_SAMPLES=$TIMES"
          echo "$TIMES" | tr ' ' '\n' | grep -E '^[0-9]+$' | \
            awk 'NR==1{min=$1;max=$1} {s+=$1; n++; if($1<min)min=$1; if($1>max)max=$1} END{ if(n>0) printf "KPI3_LIGHTR_COLDSTART_MS mean=%.1f min=%d max=%d n=%d (includes crictl gRPC round-trip overhead)\n", s/n, min, max, n }'

          # serve idle RSS after one pod (honest footprint datum on this runner).
          SERVE_PID=$(pgrep -f lightr-cri-serve | head -1)
          if [ -n "$SERVE_PID" ]; then
            RSS_KB=$(sudo ps -o rss= -p "$SERVE_PID" 2>/dev/null | tr -d ' ')
            echo "KPI3_LIGHTR_SERVE_RSS_KB=$RSS_KB (pid $SERVE_PID, after one pod + N container cycles)"
          fi

          # ── Teardown (clean): stop the gate container, remove the pod (cascades), kill serve.
          CR stop "$CTR_ID" >/dev/null 2>&1
          CR rmp -f "$POD_ID" >/dev/null 2>&1
          echo "=== post-teardown ps -a ==="; CR ps -a 2>&1 | head
          sudo pkill -f lightr-cri-serve 2>/dev/null

          # ── B (best-effort, NON-FATAL): containerd A/B. Apples-to-oranges caveat stands.
          echo "=== B: containerd A/B (best-effort, non-fatal) ==="
          if command -v containerd >/dev/null 2>&1; then
            CTRD_SOCK=/run/containerd/containerd.sock
            sudo systemctl start containerd 2>/dev/null || sudo containerd >/tmp/containerd.log 2>&1 &
            for i in $(seq 1 30); do [ -S "$CTRD_SOCK" ] && break; sleep 1; done
            CTRD() { sudo crictl --runtime-endpoint "unix://$CTRD_SOCK" --image-endpoint "unix://$CTRD_SOCK" "$@"; }
            if [ -S "$CTRD_SOCK" ] && CTRD version >/dev/null 2>&1; then
              CTRD pull alpine:latest >/tmp/ctrd-pull.log 2>&1 && echo "containerd: alpine pulled" || { echo "containerd alpine pull failed (network?) — A/B deferred"; cat /tmp/ctrd-pull.log; }
              echo "NOTE: containerd runs the alpine ROOTFS; lightr-backend runs a host process — the cold-start numbers are NOT like-for-like and the ratio is intentionally NOT signed as a KPI here. Lead to iterate if a like-for-like harness is wanted."
              CTRD_PID=$(pgrep -x containerd | head -1)
              [ -n "$CTRD_PID" ] && echo "KPI3_CONTAINERD_RSS_KB=$(sudo ps -o rss= -p "$CTRD_PID" 2>/dev/null | tr -d ' ') (pid $CTRD_PID)"
            else
              echo "containerd socket/version not available — A/B deferred (TODO for the lead on a runner with containerd CRI up)."
            fi
          else
            echo "containerd not present — A/B deferred (TODO)."
          fi

          echo "KPI3=PASS"
