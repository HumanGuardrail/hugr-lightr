# CI gate — GitHub-hosted ONLY (public-repo safe).
#
# History (2026-07-02 restructure): the full macOS suite ran on a self-hosted
# runner (founder Intel Mac — GitHub-hosted minutes had exhausted the org
# spending limit 3× while private). Two reasons it left push/PR triggers:
# (1) a self-hosted runner on a PUBLIC repo would let fork PRs execute
# arbitrary code on the runner box; (2) an offline runner failed every push.
# The full native suite lives in ci-macos-selfhosted.yml (workflow_dispatch,
# owner-run — REQUIRED before tagging a release). On a public repo,
# GitHub-hosted standard runners are free, so this hosted gate is $0.
#
# COVERAGE here: fmt (linux) · windows cross-clippy (cfg/dead-code catch) ·
# godfile guard · linux build+unit-test visibility lane. The linux clippy
# half stays deferred until the accumulated cfg(linux) clippy drift is
# cleaned (tracked follow-up).

name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Native fmt-check on GitHub-hosted (ubuntu) — style gate independent of
  # any self-hosted box. rust-toolchain.toml pins the toolchain.
  linux-native-lint:
    name: linux fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: rustfmt component
        run: rustup component add rustfmt
      - name: cargo fmt --all --check
        run: cargo fmt --all --check

  # Cross-clippy to windows-gnu: catches windows-only cfg dead-code / unused
  # regressions (the DF-06 / STATS-TOP class). Build + clippy only; windows
  # runtime is a future ring, so lightr-acceptance (unix integration) is
  # excluded. mingw-w64 provides the C cross-compiler for C-dep build scripts.
  windows-cross:
    name: windows cross-clippy (cfg/dead-code catch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mingw + windows-gnu target + clippy
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64
          rustup target add x86_64-pc-windows-gnu
          rustup component add clippy
      - name: cargo clippy --target x86_64-pc-windows-gnu -D warnings
        run: cargo clippy --workspace --exclude lightr-acceptance --all-targets --target x86_64-pc-windows-gnu -- -D warnings

  # Enforce the godfile invariant: no source .rs may exceed 400 LOC (examples
  # exempt). Cheap, deterministic, fails loudly on regression.
  godfile-guard:
    name: godfile guard (<=400 LOC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No source .rs may exceed 400 LOC
        run: |
          BIG=$(find crates -name '*.rs' -not -path '*/target/*' -not -path '*/examples/*' -print0 \
            | xargs -0 wc -l | awk '$2!="total" && $1>400 {print}')
          if [ -n "$BIG" ]; then
            echo "::error::source files exceed 400 LOC:"; echo "$BIG"; exit 1
          fi
          echo "OK — every source file is <=400 LOC"

  # Linux build + unit-test VISIBILITY lane (continue-on-error: signal, not
  # a merge gate yet). The full acceptance suite is macOS-validated in
  # ci-macos-selfhosted.yml; this lane proves the workspace compiles and the
  # hermetic unit tests pass on linux, on free runners. Promote to a hard
  # gate after a green streak (tracked follow-up).
  linux-build-test:
    name: linux build + unit tests (visibility)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: cargo build --workspace
        run: cargo build --workspace
      - name: cargo test --workspace --lib --bins
        run: cargo test --workspace --lib --bins
