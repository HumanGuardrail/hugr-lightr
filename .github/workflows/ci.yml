# CI gate — SELF-HOSTED runner (founder Intel Mac, labels `self-hosted, macOS`).
#
# WHY self-hosted: GitHub-hosted minutes repeatedly exhausted the org Actions
# spending limit (3× blocks). The founder's Intel Mac runs every gate at $0.
#
# ONE-TIME RUNNER SETUP (owner): repo → Settings → Actions → Runners → New
# self-hosted runner → macOS → follow the steps (it self-labels `self-hosted,
# macOS, X64`). The runner box needs:
#   - rustup (rust-toolchain.toml pins 1.96.0; `rustup show` installs on demand)
#   - `brew install mingw-w64` + `rustup target add x86_64-pc-windows-gnu`
#     (for the windows cross-clippy below)
# The persistent `target/` makes runs fast; no cache action is used (self-hosted
# keeps state between runs — caching actions can fight the persistent target).
#
# COVERAGE: `gate` runs the FULL workspace suite natively on macOS — the unix
# runtime suite (incl. lightr-acceptance) executes here. `windows-cross` catches
# windows-only cfg / dead-code / unused via a cross-clippy to x86_64-pc-windows-gnu
# (the DF-06 / STATS-TOP class of bugs). Linux-specific cfg is NOT cross-checked
# per-PR (the macOS-unix build + the windows cross cover the platform splits; the
# codebase is unix / cfg(unix)). Add a self-hosted Linux runner (colima) later if
# linux-specific coverage is ever needed.

name: ci

on:
  # push fires only on main (post-merge validation + the push-only vz-build);
  # PRs are covered by pull_request. This avoids 2× CI per push on the single
  # self-hosted runner (a branch push + its PR would otherwise both fire).
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Native macOS gate: fmt + clippy + the FULL workspace test suite (the unix
  # integration suite runs natively here, so no per-OS matrix is needed).
  gate:
    name: gate (macOS native, full suite)
    runs-on: [self-hosted, macOS]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Toolchain on PATH (pinned bin — rustup-proxy-immune)
        # Use the pinned toolchain's REAL binaries directly, not the ~/.cargo/bin
        # rustup proxies (which have vanished mid-session ≥2×, exit-127'ing the
        # gate). Toolchain + components + windows-gnu std are pre-installed on the
        # self-hosted box; no `rustup` call is needed in CI.
        run: |
          echo "$HOME/.rustup/toolchains/1.96.0-x86_64-apple-darwin/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo build (fresh bin for acceptance)
        # lightr-acceptance execs target/debug/lightr via assert_cmd; build the
        # runnable bin first so acceptance never runs against a stale binary.
        run: cargo build --workspace
      - name: cargo test
        run: cargo test --workspace

  # Cross-clippy to windows-gnu: the ONLY way (on a macOS runner) to catch
  # windows-only cfg dead-code / unused-var regressions — exactly the class that
  # bit DF-06 and STATS-TOP. Build + clippy only; windows runtime is a future
  # ring (WSL), so lightr-acceptance (unix integration) is excluded.
  windows-cross:
    name: windows cross-clippy (cfg/dead-code catch)
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain on PATH (pinned bin — rustup-proxy-immune)
        # Use the pinned toolchain's REAL binaries directly, not the ~/.cargo/bin
        # rustup proxies (which have vanished mid-session ≥2×, exit-127'ing the
        # gate). Toolchain + components + windows-gnu std are pre-installed on the
        # self-hosted box; no `rustup` call is needed in CI.
        run: |
          echo "$HOME/.rustup/toolchains/1.96.0-x86_64-apple-darwin/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: cargo clippy --target x86_64-pc-windows-gnu -D warnings
        run: cargo clippy --workspace --exclude lightr-acceptance --all-targets --target x86_64-pc-windows-gnu -- -D warnings

  # Enforce the godfile invariant: no source .rs may exceed 400 LOC (examples
  # exempt). Cheap, deterministic, fails loudly on regression.
  godfile-guard:
    name: godfile guard (<=400 LOC)
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain on PATH (pinned bin — rustup-proxy-immune)
        # Use the pinned toolchain's REAL binaries directly, not the ~/.cargo/bin
        # rustup proxies (which have vanished mid-session ≥2×, exit-127'ing the
        # gate). Toolchain + components + windows-gnu std are pre-installed on the
        # self-hosted box; no `rustup` call is needed in CI.
        run: |
          echo "$HOME/.rustup/toolchains/1.96.0-x86_64-apple-darwin/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: No source .rs may exceed 400 LOC
        run: |
          BIG=$(find crates -name '*.rs' -not -path '*/target/*' -not -path '*/examples/*' -print0 \
            | xargs -0 wc -l | awk '$2!="total" && $1>400 {print}')
          if [ -n "$BIG" ]; then
            echo "::error::source files exceed 400 LOC:"; echo "$BIG"; exit 1
          fi
          echo "OK — every source file is <=400 LOC"

  # Perf-regression visibility (NOT a merge gate): bench budgets are dev-box
  # tuned; a red here is a signal to investigate, never an automatic block.
  bench:
    name: bench (perf-regression visibility)
    runs-on: [self-hosted, macOS]
    needs: gate
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain on PATH (pinned bin — rustup-proxy-immune)
        # Use the pinned toolchain's REAL binaries directly, not the ~/.cargo/bin
        # rustup proxies (which have vanished mid-session ≥2×, exit-127'ing the
        # gate). Toolchain + components + windows-gnu std are pre-installed on the
        # self-hosted box; no `rustup` call is needed in CI.
        run: |
          echo "$HOME/.rustup/toolchains/1.96.0-x86_64-apple-darwin/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name:Build release binary
        run: cargo build --release
      - name: Run bench --check
        run: ./target/release/lightr bench --check

  # vz feature build + ad-hoc codesign — RE-ENABLED on self-hosted (the founder
  # Intel Mac has the swiftc/codesign toolchain; $0). Push-to-main only (1× per
  # merge). The 2-VM E2E itself stays box-gated (needs interactive guest boot).
  vz-build:
    name: vz feature build (macOS native)
    runs-on: [self-hosted, macOS]
    needs: gate
    if: ${{ github.event_name == 'push' }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain on PATH (pinned bin — rustup-proxy-immune)
        # Use the pinned toolchain's REAL binaries directly, not the ~/.cargo/bin
        # rustup proxies (which have vanished mid-session ≥2×, exit-127'ing the
        # gate). Toolchain + components + windows-gnu std are pre-installed on the
        # self-hosted box; no `rustup` call is needed in CI.
        run: |
          echo "$HOME/.rustup/toolchains/1.96.0-x86_64-apple-darwin/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name:cargo build -p lightr-cli --features vz (Rust + Swift shim)
        run: cargo build -p lightr-cli --features vz
      - name: Ad-hoc codesign with vz entitlement
        run: |
          codesign --force --sign - --entitlements packaging/vz.entitlements target/debug/lightr
          codesign -d --entitlements - target/debug/lightr 2>&1 | head -20
          echo "vz build + ad-hoc codesign OK"
