# CI gate — fmt / clippy / test across the OS matrix, plus cross-typecheck for
# the targets without a native runner. Mirrors scripts/gate.sh on each host.
# GitHub-hosted runners honor rust-toolchain.toml (1.96.0); the founder-Mac
# proxy workaround is NOT needed here.

name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # fmt (once, platform-agnostic) + clippy + test on each native host OS.
  gate:
    name: gate (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-14, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain (honor rust-toolchain.toml)
        run: |
          rustup show
          rustup component add rustfmt clippy

      - name: Cache cargo registry + build artefacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        if: ${{ matrix.runner == 'ubuntu-latest' }}
        run: cargo fmt --all -- --check

      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build (fresh bin for acceptance)
        run: cargo build --workspace
        # The lightr-acceptance tests exec `target/debug/lightr` via assert_cmd,
        # but `cargo test` builds *test* binaries — not the runnable bin artifact
        # (lightr-acceptance has no lightr-cli dep to trigger it). Build it
        # explicitly first so acceptance never runs against a stale binary (a
        # stale-bin gate masked the F-309/scratch regression once — never again).

      - name: cargo test
        run: cargo test --workspace
        # LIGHTR_NET_TESTS intentionally unset; network tests excluded.

  # Cross-typecheck targets with no native runner above (linux/aarch64), so a
  # cfg break is caught. macOS-arm64 is natively gated above; Windows x86_64-msvc
  # (the SHIPPED triple) is natively built+tested by the windows-latest gate job
  # above — this cross-check covers aarch64-linux which has no native runner.
  cross-check:
    name: cross-check (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-unknown-linux-gnu]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain (honor rust-toolchain.toml)
        run: rustup show

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      # blake3/ring have C build scripts; cross-checking to aarch64 needs the
      # cross C toolchain (cc-rs resolves CC_<triple>) + the linker.
      - name: Install aarch64 cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Cache cargo registry + build artefacts
        uses: Swatinem/rust-cache@v2

      - name: cargo check (cross)
        run: cargo check --workspace --all-targets --target ${{ matrix.target }}

  bench:
    name: bench (perf-regression visibility)
    runs-on: ubuntu-latest
    needs: gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain (honor rust-toolchain.toml)
        run: rustup show

      - name: Cache cargo registry + build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      # Bench budgets are tuned to the dev box; a failure here is a regression
      # signal to investigate, not an automatic merge block. Runs for visibility.
      - name: Run bench --check
        run: ./target/release/lightr bench --check

  # Enforce the godfile invariant won by the split campaign: no source file may
  # exceed 400 LOC. Cheap, deterministic, fails loudly on regression.
  godfile-guard:
    name: godfile guard (<=400 LOC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No source .rs may exceed 400 LOC
        run: |
          BIG=$(find crates -name '*.rs' -not -path '*/target/*' -print0 \
            | xargs -0 wc -l | awk '$2!="total" && $1>400 {print}')
          if [ -n "$BIG" ]; then
            echo "::error::source files exceed 400 LOC:"; echo "$BIG"; exit 1
          fi
          echo "OK — every source file is <=400 LOC"

  # vz feature builds the Swift shim (vz.swift) via build.rs and ad-hoc codesigns
  # with the Virtualization entitlement. Until now ONLY the founder Intel Mac did
  # this; this job validates the vz BUILD + codesign on a clean Apple-silicon
  # runner. (The 2-VM E2E itself needs guest-boot support and stays box-gated for
  # now.) continue-on-error while we confirm the runner's swiftc/codesign shape.
  vz-build:
    name: vz feature build (macOS)
    runs-on: macos-14
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (honor rust-toolchain.toml)
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: cargo build -p lightr-cli --features vz (Rust + Swift shim)
        run: cargo build -p lightr-cli --features vz
      - name: Ad-hoc codesign with vz entitlement
        run: |
          codesign --force --sign - --entitlements packaging/vz.entitlements target/debug/lightr
          codesign -d --entitlements - target/debug/lightr 2>&1 | head -20
          echo "vz build + ad-hoc codesign OK"
