# CI gate — fmt / clippy / test across the OS matrix, plus cross-typecheck for
# the targets without a native runner. Mirrors scripts/gate.sh on each host.
# GitHub-hosted runners honor rust-toolchain.toml (1.96.0); the founder-Mac
# proxy workaround is NOT needed here.

name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # fmt (once, platform-agnostic) + clippy + test on each native host OS.
  gate:
    name: gate (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # Per-PR gate runs only on the CHEAP GitHub runners: ubuntu (1x) +
        # windows (2x). macOS-arm64 GitHub runners bill ~10x (~$10/hr) — macOS is
        # covered (a) locally on the founder box per-WP and (b) by a self-hosted
        # macOS runner once registered (gate-macos, below). Windows runtime is WSL
        # (future ring), so the unix integration suite (lightr-acceptance) runs on
        # Linux; Windows does build + clippy + lib/bin tests via `--exclude`.
        include:
          - runner: ubuntu-latest
            scope: "--workspace"
          - runner: blacksmith-4vcpu-windows-2025
            scope: "--workspace --exclude lightr-acceptance"

  # macOS gate: TO BE ADDED as a SELF-HOSTED job (labels: self-hosted, macOS) on
  # the founder box once a runner is registered (repo Settings → Actions →
  # Runners → New self-hosted runner; mirror the lightr-cri runner) — $0 vs the
  # ~$10/hr GitHub-hosted macOS. NOT wired yet: a self-hosted job with no online
  # runner hangs pending and would block merges. Until the runner is up, macOS-
  # Intel is gated LOCALLY on the founder box per-WP (the lead's cold-check), so
  # coverage is not lost. When the runner is online, add a `gate-macos` job here
  # (+ move vz-build to it) and this whole macOS gate becomes free.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain (honor rust-toolchain.toml)
        run: |
          rustup show
          rustup component add rustfmt clippy

      - name: Cache cargo registry + build artefacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        if: ${{ matrix.runner == 'ubuntu-latest' }}
        run: cargo fmt --all -- --check

      - name: cargo clippy -D warnings
        run: cargo clippy ${{ matrix.scope }} --all-targets -- -D warnings

      - name: cargo build (fresh bin for acceptance)
        run: cargo build ${{ matrix.scope }}
        # The lightr-acceptance tests exec `target/debug/lightr` via assert_cmd,
        # but `cargo test` builds *test* binaries — not the runnable bin artifact
        # (lightr-acceptance has no lightr-cli dep to trigger it). Build it
        # explicitly first so acceptance never runs against a stale binary (a
        # stale-bin gate masked the F-309/scratch regression once — never again).

      - name: cargo test
        # Windows runtime is WSL (a future ring): runtime-behavior tests (build
        # RUN-exec, run, gc, compose) exercise unix commands and cannot pass
        # windows-native. Windows validates build + clippy (cross-platform compile
        # + lint); runtime tests run on Linux + macOS where the runtime exists.
        if: ${{ matrix.runner != 'windows-latest' }}
        run: cargo test ${{ matrix.scope }}
        # LIGHTR_NET_TESTS intentionally unset; network tests excluded.

  # Cross-typecheck targets with no native runner above (linux/aarch64), so a
  # cfg break is caught. macOS-arm64 is natively gated above; Windows x86_64-msvc
  # (the SHIPPED triple) is natively built+tested by the windows-latest gate job
  # above — this cross-check covers aarch64-linux which has no native runner.
  cross-check:
    name: cross-check (${{ matrix.target }})
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-unknown-linux-gnu]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain (honor rust-toolchain.toml)
        run: rustup show

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      # blake3/ring have C build scripts; cross-checking to aarch64 needs the
      # cross C toolchain (cc-rs resolves CC_<triple>) + the linker.
      - name: Install aarch64 cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Cache cargo registry + build artefacts
        uses: Swatinem/rust-cache@v2

      - name: cargo check (cross)
        run: cargo check --workspace --all-targets --target ${{ matrix.target }}

  bench:
    name: bench (perf-regression visibility)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: gate
    # Visibility-only, codifying this job's documented intent: "a failure here is a
    # regression signal to investigate, not an automatic merge block." It also
    # immunizes CI against GitHub runner-provisioning hiccups (0-step/3s infra
    # failures) that otherwise red the whole run. Bench budgets are dev-box-tuned
    # and unreliable on hosted hardware; investigate reds, they never gate merges.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain (honor rust-toolchain.toml)
        run: rustup show

      - name: Cache cargo registry + build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      # Bench budgets are tuned to the dev box; a failure here is a regression
      # signal to investigate, not an automatic merge block. Runs for visibility.
      - name: Run bench --check
        run: ./target/release/lightr bench --check

  # Enforce the godfile invariant won by the split campaign: no source file may
  # exceed 400 LOC. Cheap, deterministic, fails loudly on regression.
  godfile-guard:
    name: godfile guard (<=400 LOC)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - name: No source .rs may exceed 400 LOC
        run: |
          # src + tests are held to <400; validation examples (run-on-demand
          # harnesses, e.g. the vz E2E) are exempt.
          BIG=$(find crates -name '*.rs' -not -path '*/target/*' -not -path '*/examples/*' -print0 \
            | xargs -0 wc -l | awk '$2!="total" && $1>400 {print}')
          if [ -n "$BIG" ]; then
            echo "::error::source files exceed 400 LOC:"; echo "$BIG"; exit 1
          fi
          echo "OK — every source file is <=400 LOC"

  # vz feature builds the Swift shim (vz.swift) via build.rs and ad-hoc codesigns
  # with the Virtualization entitlement. Until now ONLY the founder Intel Mac did
  # this; this job validates the vz BUILD + codesign on a clean Apple-silicon
  # runner. (The 2-VM E2E itself needs guest-boot support and stays box-gated for
  # now.) continue-on-error while we confirm the runner's swiftc/codesign shape.
  vz-build:
    name: vz feature build (macOS)
    runs-on: blacksmith-6vcpu-macos-15
    # GitHub-hosted macOS bills ~10x — run vz-build ONLY on push to main (1x per
    # merge), not on every PR. Moves to the self-hosted macOS runner ($0) once
    # registered. continue-on-error keeps it non-blocking either way.
    continue-on-error: true
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (honor rust-toolchain.toml)
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: cargo build -p lightr-cli --features vz (Rust + Swift shim)
        run: cargo build -p lightr-cli --features vz
      - name: Ad-hoc codesign with vz entitlement
        run: |
          codesign --force --sign - --entitlements packaging/vz.entitlements target/debug/lightr
          codesign -d --entitlements - target/debug/lightr 2>&1 | head -20
          echo "vz build + ad-hoc codesign OK"
